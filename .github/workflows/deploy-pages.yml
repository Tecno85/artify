name: Desplegar frontend en GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Validar URL del backend
        env:
          ARTIFY_API_URL: ${{ vars.ARTIFY_API_URL }}
        run: |
          if [ -z "$ARTIFY_API_URL" ]; then
            echo "::error::Falta configurar ARTIFY_API_URL"
            exit 1
          fi

      - name: Generar configuración del frontend
        env:
          ARTIFY_API_URL: ${{ vars.ARTIFY_API_URL }}
        run: node scripts/write-frontend-config.js

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4
