name: Monitorear despliegue público

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: monitor-public
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Verificar Pages, Render, PostgreSQL, analytics y CORS
        run: node scripts/validar-despliegue.js
