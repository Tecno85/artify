<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Prueba de restauración de respaldos en Artify</title>
  <desc id="desc">Flujo visual para comprobar que un respaldo de Artify puede restaurarse y validarse.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#eef9ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#27404f" flood-opacity="0.15"/>
    </filter>
    <style>
      .title{font:700 44px Arial, sans-serif;fill:#1c3440}
      .sub{font:400 23px Arial, sans-serif;fill:#5b6f77}
      .num{font:700 30px Arial, sans-serif;fill:#ffffff}
      .label{font:700 24px Arial, sans-serif;fill:#1c3440}
      .small{font:400 19px Arial, sans-serif;fill:#526a72}
    </style>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <rect x="60" y="58" width="1080" height="500" rx="34" fill="#ffffff" filter="url(#shadow)"/>
  <text x="92" y="110" class="title">Prueba de restauración</text>
  <text x="94" y="145" class="sub">Un backup solo es útil si puedo recuperarlo y comprobar la aplicación.</text>

  <g transform="translate(92 230)">
    <rect width="205" height="210" rx="28" fill="#edf8ff"/>
    <circle cx="100" cy="58" r="34" fill="#277da1"/>
    <text x="100" y="69" text-anchor="middle" class="num">1</text>
    <text x="100" y="120" text-anchor="middle" class="label">Restauro</text>
    <text x="100" y="154" text-anchor="middle" class="small">backup en base</text>
    <text x="100" y="181" text-anchor="middle" class="small">temporal</text>
  </g>

  <path d="M322 335h66" stroke="#89a7b1" stroke-width="7" stroke-linecap="round"/>
  <path d="M388 335l-26-18v36z" fill="#89a7b1"/>

  <g transform="translate(402 230)">
    <rect width="205" height="210" rx="28" fill="#f5f0ff"/>
    <circle cx="100" cy="58" r="34" fill="#7b61ff"/>
    <text x="100" y="69" text-anchor="middle" class="num">2</text>
    <text x="100" y="120" text-anchor="middle" class="label">Valido</text>
    <text x="100" y="154" text-anchor="middle" class="small">tablas, datos</text>
    <text x="100" y="181" text-anchor="middle" class="small">y relaciones</text>
  </g>

  <path d="M632 335h66" stroke="#89a7b1" stroke-width="7" stroke-linecap="round"/>
  <path d="M698 335l-26-18v36z" fill="#89a7b1"/>

  <g transform="translate(712 230)">
    <rect width="205" height="210" rx="28" fill="#edfff8"/>
    <circle cx="100" cy="58" r="34" fill="#2a9d8f"/>
    <text x="100" y="69" text-anchor="middle" class="num">3</text>
    <text x="100" y="120" text-anchor="middle" class="label">Pruebo</text>
    <text x="100" y="154" text-anchor="middle" class="small">login, admin</text>
    <text x="100" y="181" text-anchor="middle" class="small">y analíticas</text>
  </g>

  <path d="M942 335h48" stroke="#89a7b1" stroke-width="7" stroke-linecap="round"/>
  <path d="M990 335l-26-18v36z" fill="#89a7b1"/>

  <g transform="translate(1010 248)">
    <rect width="112" height="178" rx="28" fill="#fff0df"/>
    <circle cx="56" cy="72" r="46" fill="#f4a261"/>
    <path d="M30 72l16 16 34-40" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="56" y="142" text-anchor="middle" class="label">Registro</text>
  </g>
</svg>
