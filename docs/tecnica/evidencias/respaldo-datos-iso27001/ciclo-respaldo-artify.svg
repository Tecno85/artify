<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Ciclo de respaldo de datos en Artify</title>
  <desc id="desc">Ilustración editorial del ciclo de respaldo, almacenamiento seguro y restauración para Artify.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#eef7f1"/>
      <stop offset="1" stop-color="#fff6e7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#164152" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font:700 44px Arial, sans-serif;fill:#16343f}
      .sub{font:400 24px Arial, sans-serif;fill:#48626b}
      .label{font:700 30px Arial, sans-serif;fill:#18343d}
      .small{font:400 24px Arial, sans-serif;fill:#4f646b}
      .step{filter:url(#shadow)}
    </style>
  </defs>
  <rect width="1200" height="620" rx="34" fill="url(#bg)"/>
  <circle cx="1020" cy="110" r="130" fill="#28ffce" opacity="0.15"/>
  <circle cx="190" cy="520" r="160" fill="#4ae3f4" opacity="0.15"/>
  <text x="70" y="82" class="title">Ciclo de respaldo de Artify</text>
  <text x="72" y="118" class="sub">Identifico, respaldo, protejo, pruebo y mejoro la recuperación de datos.</text>

  <path d="M384 320 C430 230, 555 205, 674 268" fill="none" stroke="#38a3a5" stroke-width="10" stroke-linecap="round"/>
  <path d="M674 268 l-45 -4 26 37 z" fill="#38a3a5"/>
  <path d="M842 366 C780 474, 668 520, 604 452" fill="none" stroke="#f4a261" stroke-width="10" stroke-linecap="round"/>
  <path d="M604 452 l42 12 -22 -42 z" fill="#f4a261"/>

  <g class="step" transform="translate(72 210)">
    <rect width="300" height="175" rx="28" fill="#ffffff"/>
    <rect x="24" y="24" width="64" height="64" rx="18" fill="#e9f9fb"/>
    <path d="M40 44 h32 v8 H40zM40 60 h32 v8 H40zM40 76 h22 v8H40z" fill="#217980"/>
    <text x="112" y="64" class="label">Datos críticos</text>
    <text x="112" y="102" class="small">Usuarios</text>
    <text x="112" y="132" class="small">Sesiones</text>
    <text x="112" y="162" class="small">Operaciones</text>
  </g>

  <g class="step" transform="translate(462 170)">
    <rect width="285" height="190" rx="28" fill="#ffffff"/>
    <rect x="28" y="26" width="72" height="72" rx="22" fill="#fff2df"/>
    <path d="M64 42 c22 0 36 7 36 16v34c0 9-14 16-36 16s-36-7-36-16V58c0-9 14-16 36-16z" fill="#f4a261"/>
    <path d="M28 58c0 9 14 16 36 16s36-7 36-16M28 75c0 9 14 16 36 16s36-7 36-16" fill="none" stroke="#9b5721" stroke-width="4"/>
    <text x="122" y="64" class="label">Backup</text>
    <text x="122" y="110" class="small">pg_dump</text>
    <text x="122" y="144" class="small">Cifrado</text>
  </g>

  <g class="step" transform="translate(842 210)">
    <rect width="285" height="175" rx="28" fill="#ffffff"/>
    <rect x="24" y="24" width="64" height="64" rx="18" fill="#ecfff9"/>
    <path d="M56 42c18 0 30 12 30 29v12H26V71c0-17 12-29 30-29zm0 14c-9 0-15 6-15 15v12h30V71c0-9-6-15-15-15z" fill="#1f8f74"/>
    <text x="112" y="64" class="label">Acceso</text>
    <text x="112" y="110" class="small">Roles mínimos</text>
    <text x="112" y="144" class="small">Secretos fuera</text>
  </g>

  <g class="step" transform="translate(462 410)">
    <rect width="285" height="145" rx="28" fill="#ffffff"/>
    <rect x="28" y="26" width="72" height="72" rx="22" fill="#eef2ff"/>
    <path d="M64 40a32 32 0 1 0 32 32h-16a16 16 0 1 1-4.7-11.3L64 72h32V40L84.7 51.3A31.9 31.9 0 0 0 64 40z" fill="#536dfe"/>
    <text x="122" y="62" class="label">Restaurar</text>
    <text x="122" y="108" class="small">Base temporal</text>
    <text x="122" y="140" class="small">Validación</text>
  </g>
</svg>
