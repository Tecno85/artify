<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama UML simplificado de actores y casos de uso de Artify</title>
  <desc id="desc">Cuatro actores relacionados con siete casos de uso. Editar imagen incluye el registro interno de la sesión y sus operaciones.</desc>
  <defs>
    <style>
      .bg{fill:#111827}.area{fill:#182232;stroke:#526379;stroke-width:2}.use{fill:#243244;stroke:#7fadd1;stroke-width:2}.use-teal{fill:#243244;stroke:#6fbfb4;stroke-width:2}.use-violet{fill:#243244;stroke:#9d91c6;stroke-width:2}.internal{fill:#202e3f;stroke:#8294aa;stroke-width:2}.actor{fill:#202c3d;stroke:#8aa0b8;stroke-width:2}.assoc{fill:none;stroke:#7f93aa;stroke-width:2}.include{fill:none;stroke:#9eacc0;stroke-width:2;stroke-dasharray:8 7}.title{fill:#e8edf3;font:700 30px Arial,sans-serif}.subtitle{fill:#aebdcb;font:16px Arial,sans-serif}.label{fill:#e3e9f0;font:600 17px Arial,sans-serif}.stereo{fill:#c5cfda;font:italic 14px Arial,sans-serif}.legend{fill:#b9c5d2;font:14px Arial,sans-serif}.teal{stroke:#6fbfb4}.blue{stroke:#7fadd1}.violet{stroke:#9d91c6}.dot{fill:#91a6bb}
    </style>
    <marker id="open-arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto"><path d="M1 1L10 6L1 11" fill="none" stroke="#9eacc0" stroke-width="1.8"/></marker>
  </defs>

  <rect class="bg" width="1400" height="900" rx="24"/>
  <text class="title" x="700" y="52" text-anchor="middle">Actores y casos de uso de Artify</text>
  <text class="subtitle" x="700" y="81" text-anchor="middle">Representación UML simplificada del sistema implementado</text>
  <rect class="area" x="300" y="110" width="800" height="700" rx="28"/>
  <text class="label" x="700" y="145" text-anchor="middle">Sistema Artify</text>

  <!-- Asociaciones simples: se dibujan detrás de los casos de uso. -->
  <g class="assoc">
    <path d="M230 275C300 250 350 230 420 230"/>
    <path d="M230 300C345 135 675 135 780 230"/>
    <path d="M230 615C305 590 350 405 420 370"/>
    <path d="M230 635C390 635 655 425 780 370"/>
    <path d="M230 655C325 650 355 525 420 510"/>
    <path d="M1170 285C1115 260 1070 235 1020 230"/>
    <path d="M1170 310C1110 380 1080 485 1020 510"/>
    <path d="M1170 335C1105 475 1080 625 1020 650"/>
    <path d="M1170 660C1115 660 1070 650 1020 650"/>
  </g>

  <!-- Relación UML include: el caso principal apunta al caso incluido. -->
  <path class="include" d="M660 370H700V650H660" marker-end="url(#open-arrow)"/>
  <text class="stereo" x="711" y="520" transform="rotate(90 711 520)" text-anchor="middle">«include»</text>

  <!-- Actores -->
  <g transform="translate(75 175)"><circle class="actor teal" cx="80" cy="54" r="34"/><path class="assoc teal" d="M80 88v84M30 122h100M80 172l-44 65M80 172l44 65"/><text class="label" x="80" y="275" text-anchor="middle">Visitante</text></g>
  <g transform="translate(65 510)"><circle class="actor blue" cx="90" cy="54" r="34"/><path class="assoc blue" d="M90 88v84M40 122h100M90 172l-44 65M90 172l44 65"/><text class="label" x="90" y="275" text-anchor="middle">Usuario registrado</text></g>
  <g transform="translate(1165 175)"><circle class="actor violet" cx="80" cy="54" r="34"/><path class="assoc violet" d="M80 88v84M30 122h100M80 172l-44 65M80 172l44 65"/><text class="label" x="80" y="275" text-anchor="middle">Administrador</text></g>
  <g transform="translate(1165 570)"><rect class="actor" x="25" y="28" width="110" height="78" rx="16"/><circle class="dot" cx="50" cy="67" r="7"/><circle class="dot" cx="80" cy="67" r="7"/><circle class="dot" cx="110" cy="67" r="7"/><text class="label" x="80" y="145" text-anchor="middle">Sistema externo</text></g>

  <!-- Casos de uso -->
  <g class="label" text-anchor="middle">
    <ellipse class="use-teal" cx="540" cy="230" rx="120" ry="42"/><text x="540" y="236">Registrarse</text>
    <ellipse class="use" cx="900" cy="230" rx="120" ry="42"/><text x="900" y="236">Iniciar sesión</text>
    <ellipse class="use" cx="540" cy="370" rx="120" ry="42"/><text x="540" y="365">Cargar y editar</text><text x="540" y="388">una imagen</text>
    <ellipse class="use" cx="900" cy="370" rx="120" ry="42"/><text x="900" y="365">Convertir y</text><text x="900" y="388">descargar</text>
    <ellipse class="use" cx="540" cy="510" rx="120" ry="42"/><text x="540" y="505">Gestionar</text><text x="540" y="528">configuración</text>
    <ellipse class="use-violet" cx="900" cy="510" rx="120" ry="42"/><text x="900" y="516">Gestionar usuarios</text>
    <ellipse class="internal" cx="540" cy="650" rx="120" ry="42"/><text x="540" y="645">Registrar sesión</text><text x="540" y="668">y operaciones</text>
    <ellipse class="use-violet" cx="900" cy="650" rx="120" ry="42"/><text x="900" y="656">Consultar analíticas</text>
  </g>

  <!-- Leyenda -->
  <g transform="translate(395 760)"><path class="assoc" d="M0 0H65"/><text class="legend" x="78" y="5">Asociación actor–caso de uso</text><path class="include" d="M350 0H415" marker-end="url(#open-arrow)"/><text class="legend" x="430" y="5">Relación «include»</text></g>
  <text class="legend" x="700" y="858" text-anchor="middle">Figura elaborada a partir de los requerimientos funcionales vigentes de Artify</text>
</svg>
