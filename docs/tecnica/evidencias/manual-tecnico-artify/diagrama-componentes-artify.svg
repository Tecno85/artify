<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de componentes de Artify</title><desc id="desc">Frontend, backend y base de datos de Artify con sus servicios de despliegue.</desc>
  <defs><style>.bg{fill:#111827}.layer{fill:#182433;stroke:#596d84;stroke-width:2}.card{fill:#253548;stroke-width:2}.teal{stroke:#6fbfb4}.blue{stroke:#7fadd1}.violet{stroke:#9d91c6}.title{fill:#e8edf3;font:700 30px Arial,sans-serif}.sub{fill:#aebdcb;font:16px Arial,sans-serif}.head{fill:#e5ebf1;font:700 20px Arial,sans-serif}.text{fill:#c4cfda;font:16px Arial,sans-serif}.tag{fill:#9facc0;font:14px Arial,sans-serif}.line{fill:none;stroke:#7f93aa;stroke-width:3}.dash{stroke-dasharray:9 8}</style><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#7f93aa"/></marker></defs>
  <rect class="bg" width="1500" height="900" rx="24"/><text class="title" x="750" y="52" text-anchor="middle">Componentes de Artify</text><text class="sub" x="750" y="82" text-anchor="middle">Separación de responsabilidades y comunicación entre capas</text>
  <g transform="translate(55 320)"><rect class="card teal" width="180" height="150" rx="24"/><circle cx="90" cy="48" r="25" fill="#33475a" stroke="#6fbfb4" stroke-width="2"/><path d="M48 122c8-34 76-34 84 0" fill="none" stroke="#6fbfb4" stroke-width="2"/><text class="head" x="90" y="145" text-anchor="middle">Persona usuaria</text></g>
  <g transform="translate(315 135)"><rect class="layer" width="360" height="600" rx="26"/><text class="head" x="180" y="42" text-anchor="middle">Frontend</text><text class="tag" x="180" y="68" text-anchor="middle">GitHub Pages o servidor local</text><rect class="card teal" x="45" y="105" width="270" height="78" rx="16"/><text class="text" x="180" y="151" text-anchor="middle">HTML5 y CSS3</text><rect class="card teal" x="45" y="220" width="270" height="78" rx="16"/><text class="text" x="180" y="266" text-anchor="middle">JavaScript Vanilla</text><rect class="card teal" x="45" y="335" width="270" height="78" rx="16"/><text class="text" x="180" y="381" text-anchor="middle">Canvas API</text><rect class="card teal" x="45" y="450" width="270" height="92" rx="16"/><text class="text" x="180" y="490" text-anchor="middle">sessionStorage</text><text class="text" x="180" y="516" text-anchor="middle">y localStorage</text></g>
  <g transform="translate(765 135)"><rect class="layer" width="360" height="600" rx="26"/><text class="head" x="180" y="42" text-anchor="middle">Backend Node.js</text><text class="tag" x="180" y="68" text-anchor="middle">Render o proceso local</text><rect class="card blue" x="45" y="105" width="270" height="70" rx="16"/><text class="text" x="180" y="147" text-anchor="middle">Express 5</text><rect class="card blue" x="45" y="205" width="270" height="70" rx="16"/><text class="text" x="180" y="247" text-anchor="middle">Rutas</text><rect class="card blue" x="45" y="305" width="270" height="70" rx="16"/><text class="text" x="180" y="347" text-anchor="middle">Middlewares</text><rect class="card blue" x="45" y="405" width="270" height="70" rx="16"/><text class="text" x="180" y="447" text-anchor="middle">Controladores</text><rect class="card blue" x="45" y="505" width="270" height="55" rx="16"/><text class="text" x="180" y="539" text-anchor="middle">Utilidades</text></g>
  <g transform="translate(1215 260)"><rect class="layer" width="230" height="350" rx="26"/><text class="head" x="115" y="44" text-anchor="middle">PostgreSQL</text><text class="tag" x="115" y="70" text-anchor="middle">Neon o servicio local</text><ellipse class="card violet" cx="115" cy="140" rx="72" ry="32"/><path class="card violet" d="M43 140v120c0 18 32 32 72 32s72-14 72-32V140"/><path d="M43 180c0 18 32 32 72 32s72-14 72-32M43 220c0 18 32 32 72 32s72-14 72-32" fill="none" stroke="#9d91c6" stroke-width="2"/><text class="text" x="115" y="325" text-anchor="middle">Tablas, vista</text><text class="text" x="115" y="348" text-anchor="middle">e índices</text></g>
  <g class="line" marker-end="url(#a)"><path d="M235 395H315"/><path d="M675 395H765"/><path d="M1125 395H1215"/><path d="M495 318V355"/><path d="M945 310V335"/><path d="M945 410V435"/><path d="M945 510V535"/></g>
  <text class="tag" x="275" y="378" text-anchor="middle">HTTP(S)</text><text class="tag" x="720" y="378" text-anchor="middle">fetch · JSON · token</text><text class="tag" x="1170" y="378" text-anchor="middle">pg · SQL</text>
  <path class="line dash" d="M495 760V815H1330V610" marker-end="url(#a)"/><text class="tag" x="890" y="842" text-anchor="middle">El frontend nunca accede directamente a PostgreSQL</text>
</svg>
