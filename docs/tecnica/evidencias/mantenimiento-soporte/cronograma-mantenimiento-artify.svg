<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Cronograma de mantenimiento preventivo y correctivo de Artify</title>
  <desc id="desc">Calendario semestral con controles técnicos, funcionales, de salud, CORS, respaldos y documentación mensuales; revisión de esquema y restauración controlada en los meses 3 y 6; y mantenimiento correctivo bajo demanda.</desc>
  <defs>
