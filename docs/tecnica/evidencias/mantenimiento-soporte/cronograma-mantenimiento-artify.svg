<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Cronograma de mantenimiento preventivo y correctivo de Artify</title>
  <desc id="desc">Calendario semestral de actividades de mantenimiento para frontend, backend, base de datos, seguridad, pruebas y documentacion.</desc>
